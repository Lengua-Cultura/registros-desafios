<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso al Registro de Desafíos</title>
<style>
  :root {
    --azul: #0b4f6c;
    --azul-claro: #e8f1f5;
    --verde: #2e7d32;
    --gris: #6b7280;
    --borde: #d0d7de;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f5f7f8;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .tarjeta {
    max-width: 420px;
    width: 100%;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    padding: 28px 24px;
    text-align: center;
  }
  h1 {
    font-size: 1.15rem;
    color: var(--azul);
    margin: 0 0 4px 0;
  }
  .subtitulo {
    color: var(--gris);
    font-size: 0.85rem;
    margin: 0 0 20px 0;
  }
  .qr-wrap {
    background: var(--azul-claro);
    border-radius: 10px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 18px;
  }
  .qr-wrap img {
    width: 220px;
    height: 220px;
    display: block;
  }
  .instruccion {
    font-size: 0.82rem;
    color: var(--gris);
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .link-box {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .link-box input {
    flex: 1;
    padding: 9px 10px;
    border: 1px solid var(--borde);
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--azul);
    background: #fafbfc;
  }
  .btn-copiar {
    padding: 9px 14px;
    background: var(--azul);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-copiar:hover { background: #093f57; }
  .btn-copiar.copiado { background: var(--verde); }
  .btn-abrir {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--verde);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    box-sizing: border-box;
  }
  .btn-abrir:hover { background: #256428; }
</style>
</head>
<body>
<div class="tarjeta">
  <h1>Registro del Desafío Comunitario</h1>
  <p class="subtitulo">Carrera de Lengua y Cultura</p>

  <div class="qr-wrap">
    <img src="qr_integrantes.png" alt="Código QR de acceso al formulario">
  </div>

  <p class="instruccion">Escanea el código con la cámara de tu celular, o usa el enlace de abajo.</p>

  <div class="link-box">
    <input type="text" id="campoLink" value="https://lengua-cultura.github.io/registros-desafios/integrantes.html" readonly>
    <button class="btn-copiar" id="btnCopiar">Copiar</button>
  </div>

  <a class="btn-abrir" href="https://lengua-cultura.github.io/registros-desafios/integrantes.html" target="_blank">Abrir formulario</a>
</div>

<script>
document.getElementById('btnCopiar').addEventListener('click', () => {
  const campo = document.getElementById('campoLink');
  campo.select();
  navigator.clipboard.writeText(campo.value).then(() => {
    const btn = document.getElementById('btnCopiar');
    const textoOriginal = btn.textContent;
    btn.textContent = '¡Copiado!';
    btn.classList.add('copiado');
    setTimeout(() => {
      btn.textContent = textoOriginal;
      btn.classList.remove('copiado');
    }, 1800);
  });
});
</script>
</body>
</html>
